variant_template:
  normalization_part:
    flat_table_examples:
      - order_delivery_flat
      - subscription_billing_flat
      - course_enrollment_flat
    required_items:
      - functional_dependencies
      - candidate_key
      - update_anomaly
      - deletion_anomaly
      - decomposition
      - lossless_check
  transaction_part:
    scenarios:
      - non_repeatable_read
